server:
  port: 8080
  read_timeout: 30s
  write_timeout: 120s

database:
  host: localhost
  port: 5432
  user: gateway
  password: gateway123
  dbname: ai_gateway
  max_open_conns: 50
  max_idle_conns: 10

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 100

security:
  master_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  jwt_secret: "admin"
  jwt_expire: 24h

proxy:
  timeout: 120s
  max_idle_conns: 200
  idle_conn_timeout: 90s

loadbalancer:
  strategy: weighted_round_robin
  circuit_breaker:
    failure_threshold: 5
    recovery_timeout: 30s
    half_open_max_probes: 3
